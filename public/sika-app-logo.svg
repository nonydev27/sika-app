<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient circle -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F2854"/>
      <stop offset="50%" stop-color="#1C4D8D"/>
      <stop offset="100%" stop-color="#4988C4"/>
    </linearGradient>
    <linearGradient id="coinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5D76E"/>
      <stop offset="50%" stop-color="#F7C94B"/>
      <stop offset="100%" stop-color="#D4A72C"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BDE8F5"/>
      <stop offset="100%" stop-color="#6BB3D9"/>
    </linearGradient>
  </defs>
  
  <!-- Main rounded background -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="url(#bgGradient)"/>
  
  <!-- Subtle inner glow ring -->
  <circle cx="256" cy="256" r="200" stroke="url(#accentGradient)" stroke-width="4" fill="none" opacity="0.3"/>
  
  <!-- Outer ring - representing globe/connectivity -->
  <circle cx="256" cy="256" r="170" stroke="#BDE8F5" stroke-width="8" fill="none" opacity="0.4"/>
  
  <!-- Central coin/coin stack - representing savings -->
  <circle cx="256" cy="230" r="90" fill="url(#coinGradient)"/>
  
  <!-- Cedi symbol (₵) - stylized -->
  <text x="256" y="265" font-family="Arial, sans-serif" font-size="90" font-weight="bold" fill="#0F2854" text-anchor="middle">₵</text>
  
  <!-- Sparkle accents - representing growth/success -->
  <path d="M380 120 L390 140 L410 150 L390 160 L380 180 L370 160 L350 150 L370 140 Z" fill="#F5D76E"/>
  <path d="M132 380 L140 395 L155 402 L140 410 L132 425 L124 410 L109 402 L124 395 Z" fill="#F5D76E" opacity="0.8"/>
  
  <!-- Upward trend arrow - representing budget growth -->
  <path d="M180 340 L240 280 L240 310 L320 310 L320 250 L350 250 L350 340 Z" fill="url(#accentGradient)" opacity="0.9"/>
  
  <!-- Small decorative dots -->
  <circle cx="120" cy="150" r="8" fill="#BDE8F5" opacity="0.6"/>
  <circle cx="400" cy="350" r="6" fill="#BDE8F5" opacity="0.5"/>
  <circle cx="420" cy="180" r="5" fill="#F5D76E" opacity="0.7"/>
  <circle cx="100" cy="320" r="7" fill="#F5D76E" opacity="0.6"/>
</svg>
